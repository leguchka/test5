<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iframe Test (No Loop)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .frame-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    iframe {
      border: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="frame-wrap" id="frame-wrap"></div>

  <script>
    (function initIframe() {
      // Prevent duplicate initialization by repeated script execution.
      if (window.__chat2deskFrameInitDone) return;
      window.__chat2deskFrameInitDone = true;

      // Prevent recursive embedding: if this page itself is loaded inside a frame,
      // do not create another frame with the same source.
      if (window.top !== window.self) {
        document.body.innerHTML = '';
        return;
      }

      var frame = document.createElement('iframe');
      frame.allowFullscreen = true;
      frame.src = 'https://chat2desk.com/';

      document.getElementById('frame-wrap').appendChild(frame);
    })();
  </script>
</body>
</html>
